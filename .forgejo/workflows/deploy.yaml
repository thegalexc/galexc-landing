name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main, 'feat/**', 'agent/**']

jobs:
  deploy:
    runs-on: docker
    defaults:
      run:
        shell: bash
    container:
      image: node:24-slim
    steps:
      - name: Install system dependencies
        run: apt-get update && apt-get install -y git ca-certificates curl

      - name: Checkout
        run: git clone --branch "$GITHUB_REF_NAME" "https://x-access-token:${FORGE_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .
        env:
          FORGE_TOKEN: ${{ github.token }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        run: |
          pnpm exec wrangler deploy dist/server/entry.mjs \
            --config dist/server/wrangler.json \
            --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
