name: Deploy to Cloudflare Workers
on:
    push:
        branches: [main, 'feat/**', 'agent/**']

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    deploy:
        runs-on: docker
        defaults:
            run:
                shell: bash
        container:
            image: node:24-slim
        steps:
            - name: Install system dependencies
              run: apt-get update && apt-get install -y git ca-certificates curl

            - name: Checkout
              run: git clone --branch "$GITHUB_REF_NAME" "https://x-access-token:${FORGE_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .
              env:
                  FORGE_TOKEN: ${{ github.token }}

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install SOPS
              run: |
                  SOPS_VERSION="v3.9.4"
                  curl -L -o /usr/local/bin/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
                  chmod +x /usr/local/bin/sops
                  sops --version

            - name: Determine secrets file
              id: secrets
              run: |
                  if [ "$GITHUB_REF_NAME" = "main" ]; then
                    echo "file=secrets/github.env" >> $GITHUB_OUTPUT
                  else
                    echo "file=secrets/github-preview.env" >> $GITHUB_OUTPUT
                  fi

            - name: Build
              run: |
                  sops exec-env "${{ steps.secrets.outputs.file }}" \
                    "pnpm build"
              env:
                  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

            - name: Apply D1 migrations
              if: github.ref_name == 'main'
              run: |
                  sops exec-env "${{ steps.secrets.outputs.file }}" \
                    "pnpm exec wrangler d1 migrations apply DB --remote"
              env:
                  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

            - name: Prepare worker runtime secrets
              run: |
                  sops exec-env "${{ steps.secrets.outputs.file }}" \
                    'printf "GALEXC_BOOTSTRAP_ADMIN_EMAILS=%s\nGALEXC_ADMIN_PASSWORD=%s\nGALEXC_COOKIE_SECRET=%s\nTURNSTILE_SITE_KEY=%s\nTURNSTILE_SECRET=%s\nIP_HMAC_SECRET=%s\n" "$GALEXC_BOOTSTRAP_ADMIN_EMAILS" "$GALEXC_ADMIN_PASSWORD" "$GALEXC_COOKIE_SECRET" "$TURNSTILE_SITE_KEY" "$TURNSTILE_SECRET" "$IP_HMAC_SECRET" > /tmp/worker-secrets.env'
              env:
                  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

            - name: Prepare preview worker config
              if: github.ref_name != 'main'
              run: |
                  BRANCH_SLUG=$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9-]#-#g; s#--*#-#g; s#^-##; s#-$##' | cut -c1-32)
                  export BRANCH_SLUG
                  node - <<'NODE'
                  const fs = require('fs');
                  const path = 'dist/server/wrangler.json';
                  const out = '/tmp/wrangler-preview.json';
                  const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
                  const branchSlug = process.env.BRANCH_SLUG;
                  cfg.name = `galexc-landing-preview-${branchSlug}`;
                  cfg.routes = [];
                  cfg.vars = { ...(cfg.vars || {}), PREVIEW_MODE: 'true' };
                  cfg.workers_dev = true;
                  fs.writeFileSync(out, JSON.stringify(cfg));
                  console.log(`wrote ${out} for ${cfg.name}`);
                  NODE

            - name: Deploy to Cloudflare Workers
              id: deploy
              run: |
                  set -o pipefail
                  if [ "$GITHUB_REF_NAME" = "main" ]; then
                    sops exec-env "${{ steps.secrets.outputs.file }}" \
                      "pnpm exec wrangler deploy dist/server/entry.mjs --config dist/server/wrangler.json --keep-vars --secrets-file /tmp/worker-secrets.env" \
                      2>&1 | tee /tmp/deploy-output.txt
                  else
                    sops exec-env "${{ steps.secrets.outputs.file }}" \
                      "pnpm exec wrangler deploy dist/server/entry.mjs --config /tmp/wrangler-preview.json --keep-vars --secrets-file /tmp/worker-secrets.env" \
                      2>&1 | tee /tmp/deploy-output.txt
                  fi
                  DEPLOY_URL=$(grep -oE 'https://[^ ]+\.workers\.dev' /tmp/deploy-output.txt | tail -1)
                  echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
              env:
                  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

            - name: Notify preview URL
              if: startsWith(github.ref_name, 'feat/') || startsWith(github.ref_name, 'agent/')
              run: |
                  DEPLOY_URL="${{ steps.deploy.outputs.url }}"
                  curl -s \
                    -H "Authorization: Bearer $NTFY_TOKEN" \
                    -H "Title: galexc-landing preview ready" \
                    -H "Tags: white_check_mark" \
                    -d "$GITHUB_REF_NAME → ${DEPLOY_URL:-preview deploy finished}" \
                    https://ntfy.crested-altair.ts.net/alerts
              env:
                  NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
